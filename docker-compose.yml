services:
  grok-proxy:
    image: ghcr.io/myflavor/grok-proxy:v0.3.0
    container_name: grok-proxy
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # CPA JSON（活号 + 可选 *.json.dead）
      - ./cpa:/data/cpa
      # SSO accounts.txt（email:password:sso）用于 RT 死后复活
      - ./sso:/data/sso
      - ./config.json:/app/config.json:ro
