services:
  grok-proxy:
    image: ghcr.io/myflavor/grok-proxy:v0.3.2
    container_name: grok-proxy
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # CPA JSON（只加载 *.json；*.json.dead 为坟场，不加载）
      - ./cpa:/data/cpa
      # SSO accounts.txt（email:password:sso）— RT 死后先 SSO 复活
      - ./sso:/data/sso
      - ./config.json:/app/config.json:ro
